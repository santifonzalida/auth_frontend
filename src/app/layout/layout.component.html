<div class="min-h-screen flex flex-col bg-gray-50">

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="fixed top-0 inset-x-0 z-30 h-16 bg-white shadow-sm flex items-center">
    <div class="flex items-center justify-between w-full px-4 sm:px-6">

      <!-- Izquierda: hamburguesa + nombre de la app -->
      <div class="flex items-center space-x-3">
        <button
          (click)="toggleSidebar()"
          class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors"
          aria-label="Abrir menú"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <span class="text-lg font-bold text-gray-900">Menu</span>
      </div>

      <!-- Derecha: usuario + logout -->
      <div class="flex items-center space-x-4">
        <span class="hidden sm:block text-sm text-gray-600 font-medium">
          {{ authService.currentUser()?.apellido }}, {{ authService.currentUser()?.nombre }}
        </span>
        <!-- Botón con texto (sm+) -->
        <button
          (click)="logout()"
          class="hidden sm:inline-flex items-center px-4 py-2 bg-red-600 text-white text-sm rounded-lg hover:bg-red-700 transition-colors"
        >
          Cerrar sesión
        </button>
        <!-- Solo icono (mobile) -->
        <button
          (click)="logout()"
          class="sm:hidden p-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors"
          title="Cerrar sesión"
          aria-label="Cerrar sesión"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>

    </div>
  </header>

  <!-- ═══════════════════ BODY ═══════════════════ -->
  <div class="flex flex-1 pt-16">

    <!-- Overlay mobile -->
    @if (sidebarOpen) {
      <div
        class="fixed inset-0 z-20 bg-black/40 lg:hidden"
        (click)="sidebarOpen = false"
      ></div>
    }

    <!-- ──── SIDEBAR ──── -->
    <aside
      class="fixed top-16 bottom-0 left-0 z-20 w-64 bg-white shadow-lg overflow-y-auto
             transition-transform duration-300 ease-in-out lg:translate-x-0"
      [ngClass]="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    >
      <nav class="p-4 space-y-1">

        <!-- Dashboard -->
        <a routerLink="/dashboard"
           routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
           [routerLinkActiveOptions]="{ exact: true }"
           (click)="sidebarOpen = false"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span>Dashboard</span>
        </a>

        <!-- Salas -->
        <a routerLink="/salas"
           routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
           (click)="sidebarOpen = false"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          <span>Salas</span>
        </a>

        <!-- Profesionales -->
        <a routerLink="/profesionales"
           routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
           (click)="sidebarOpen = false"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <span>Profesionales</span>
        </a>

        <!-- Tutores -->
        <a routerLink="/tutores"
           routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
           (click)="sidebarOpen = false"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
          </svg>
          <span>Tutores</span>
        </a>

        <!-- Pacientes -->
        <a routerLink="/pacientes"
           routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
           (click)="sidebarOpen = false"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
          </svg>
          <span>Pacientes</span>
        </a>

      </nav>
    </aside>

    <!-- ──── CONTENIDO PRINCIPAL ──── -->
    <main class="flex-1 min-w-0 overflow-auto p-6 lg:ml-64">
      <router-outlet />
    </main>

  </div>
</div>
